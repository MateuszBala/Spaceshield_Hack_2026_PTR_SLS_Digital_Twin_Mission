[project]
name = "ai"
version = "0.1.0"
description = "Backend AI — Monte Carlo i optymalizacja parametrow."
requires-python = ">=3.12"
dependencies = ["contracts", "physics-engine", "numpy>=2", "scipy>=1.13"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dt_ai"]