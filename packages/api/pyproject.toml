[project]
name = "api"
version = "0.1.0"
description = "Backend HTTP (FastAPI) serwujacy dane do frontendu."
requires-python = ">=3.12"
dependencies = ["contracts", "physics-engine", "fastapi>=0.115", "uvicorn>=0.30", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dt_api"]