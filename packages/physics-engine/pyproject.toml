[project]
name = "physics-engine"
version = "0.1.0"
description = "Silnik fizyczny — czysta numeryka (NumPy/SciPy)."
requires-python = ">=3.12"
dependencies = ["contracts", "numpy>=2", "scipy>=1.13", "pandas>=2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dt_physics"]